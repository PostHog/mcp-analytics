name: Release

on:
  push:
    branches: [main]
    paths:
      - ".changeset/**"
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check-changesets:
    name: Check release state
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has-changesets: ${{ steps.check.outputs.has-changesets }}
      package-version: ${{ steps.check.outputs.package-version }}
      package-published: ${{ steps.check.outputs.package-published }}
      should-release: ${{ steps.check.outputs.should-release }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0

      - name: Check release state
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "package-version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Current package version: @posthog/mcp@$VERSION"

          if find .changeset -maxdepth 1 -type f -name '*.md' ! -name README.md | grep -q .; then
            echo "has-changesets=true" >> "$GITHUB_OUTPUT"
            echo "Found changesets to version."
            HAS_CHANGESETS=true
          else
            echo "has-changesets=false" >> "$GITHUB_OUTPUT"
            echo "No changesets found."
            HAS_CHANGESETS=false
          fi

          if npm view "@posthog/mcp@$VERSION" version >/dev/null 2>&1; then
            echo "package-published=true" >> "$GITHUB_OUTPUT"
            echo "@posthog/mcp@$VERSION is already published."
            PACKAGE_PUBLISHED=true
          else
            echo "package-published=false" >> "$GITHUB_OUTPUT"
            echo "@posthog/mcp@$VERSION is not published yet."
            PACKAGE_PUBLISHED=false
          fi

          if [ "$HAS_CHANGESETS" = "true" ] || [ "$PACKAGE_PUBLISHED" = "false" ]; then
            echo "should-release=true" >> "$GITHUB_OUTPUT"
            echo "Release should continue."
          else
            echo "should-release=false" >> "$GITHUB_OUTPUT"
            echo "No pending changesets and current package version is already published. Skipping release."
          fi

  notify-approval-needed:
    name: Notify Slack - Approval Needed
    needs: check-changesets
    if: needs.check-changesets.outputs.should-release == 'true'
    uses: PostHog/.github/.github/workflows/notify-approval-needed.yml@d2e7c952fef6a22b2210bcffc70bec71abeeba03
    with:
      slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
      slack_user_group_id: ${{ vars.GROUP_CLIENT_LIBRARIES_SLACK_GROUP_ID }}
    secrets:
      slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
      posthog_project_api_key: ${{ secrets.POSTHOG_PROJECT_API_KEY }}

  release:
    name: Publish package
    needs: [check-changesets, notify-approval-needed]
    if: always() && needs.check-changesets.outputs.should-release == 'true' && needs.notify-approval-needed.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: NPM Release
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Notify Slack - Approved
        if: needs.notify-approval-needed.outputs.slack_ts != ''
        continue-on-error: true
        uses: PostHog/.github/.github/actions/slack-thread-reply@d2e7c952fef6a22b2210bcffc70bec71abeeba03
        with:
          slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
          slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
          thread_ts: ${{ needs.notify-approval-needed.outputs.slack_ts }}
          message: "✅ Release approved! Publishing `@posthog/mcp`..."
          emoji_reaction: "white_check_mark"

      - name: Get GitHub App token
        id: releaser
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3
        with:
          client-id: ${{ secrets.GH_APP_POSTHOG_MCP_RELEASER_APP_ID }}
          private-key: ${{ secrets.GH_APP_POSTHOG_MCP_RELEASER_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.releaser.outputs.token }}

      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 10.33.2

      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          cache: "pnpm"

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@11.6.4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Version package from changesets
        if: needs.check-changesets.outputs.has-changesets == 'true'
        run: |
          pnpm bump
          pnpm install --lockfile-only

      - name: Read package version
        id: package
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "Invalid package version: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved @posthog/mcp@$VERSION"

      - name: Commit version bump
        id: commit-version-bump
        if: needs.check-changesets.outputs.has-changesets == 'true'
        uses: planetscale/ghcommit-action@25309d8005ac7c3bcd61d3fe19b69e0fe47dbdde
        with:
          commit_message: "chore: update package version [version bump]"
          repo: ${{ github.repository }}
          branch: main
        env:
          GITHUB_TOKEN: ${{ steps.releaser.outputs.token }}

      - name: Check whether package version already exists
        id: npm
        env:
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          if npm view "@posthog/mcp@$VERSION" version >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "@posthog/mcp@$VERSION already exists on npm; skipping publish."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "@posthog/mcp@$VERSION is not on npm yet; publishing."
          fi

      - name: Publish package to npm
        if: steps.npm.outputs.should_publish == 'true'
        env:
          NPM_CONFIG_PROVENANCE: true
        run: npm publish --access public

      - name: Tag release
        if: steps.npm.outputs.should_publish == 'true'
        env:
          COMMIT_HASH: ${{ steps.commit-version-bump.outputs.commit-hash }}
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          git fetch origin main --tags
          TARGET_SHA="${COMMIT_HASH:-origin/main}"
          git tag "@posthog/mcp@$VERSION" "$TARGET_SHA"
          git push origin "@posthog/mcp@$VERSION"

      - name: Create GitHub release
        if: steps.npm.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ steps.releaser.outputs.token }}
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          if [ -f CHANGELOG.md ]; then
            awk '/^## /{if (seen) exit; seen=1} seen' CHANGELOG.md > release-notes.md
          else
            echo "@posthog/mcp@$VERSION" > release-notes.md
          fi
          gh release create "@posthog/mcp@$VERSION" \
            --target main \
            --title "$VERSION" \
            --notes-file release-notes.md

      - name: Notify Slack - Released
        if: steps.npm.outputs.should_publish == 'true' && needs.notify-approval-needed.outputs.slack_ts != ''
        continue-on-error: true
        uses: PostHog/.github/.github/actions/slack-thread-reply@d2e7c952fef6a22b2210bcffc70bec71abeeba03
        with:
          slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
          slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
          thread_ts: ${{ needs.notify-approval-needed.outputs.slack_ts }}
          message: "🚀 `@posthog/mcp@${{ steps.package.outputs.version }}` released successfully!"
          emoji_reaction: "rocket"
          remove_emoji_reaction: "x"

      - name: Notify Slack - Failed
        if: ${{ failure() && needs.notify-approval-needed.outputs.slack_ts != '' }}
        continue-on-error: true
        uses: PostHog/.github/.github/actions/slack-thread-reply@d2e7c952fef6a22b2210bcffc70bec71abeeba03
        with:
          slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
          slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
          thread_ts: ${{ needs.notify-approval-needed.outputs.slack_ts }}
          message: "❌ Failed to release `@posthog/mcp`! <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
          emoji_reaction: "x"

      - name: Send failure event to PostHog
        if: ${{ failure() }}
        uses: PostHog/posthog-github-action@eea1405eeb2d1d2259f0ee0b44d7b152869e6840
        with:
          posthog-token: ${{ secrets.POSTHOG_PROJECT_API_KEY }}
          event: "posthog-mcp-github-release-workflow-failure"
          properties: >-
            {
              "commitSha": "${{ github.sha }}",
              "jobStatus": "${{ job.status }}",
              "ref": "${{ github.ref }}",
              "jobName": "release",
              "packageName": "@posthog/mcp",
              "packageVersion": "${{ steps.package.outputs.version }}"
            }

  notify-rejected:
    name: Notify Slack - Rejected
    needs: [release, notify-approval-needed]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always() && needs.release.result == 'failure' && needs.notify-approval-needed.outputs.slack_ts != ''
    steps:
      - name: Check for rejection
        id: check-rejection
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RESPONSE=$(gh api /repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/approvals)
          REJECTED=$(echo "$RESPONSE" | jq '[.[] | select(.state == "rejected")] | length')
          if [ "$REJECTED" -gt 0 ]; then
            echo "was_rejected=true" >> "$GITHUB_OUTPUT"
            COMMENT=$(echo "$RESPONSE" | jq -r '.[] | select(.state == "rejected") | .comment // empty' | head -1)
            if [ -n "$COMMENT" ]; then
              {
                echo 'message<<EOF'
                echo "🚫 Release was rejected: $COMMENT"
                echo 'EOF'
              } >> "$GITHUB_OUTPUT"
            else
              echo "message=🚫 Release was rejected." >> "$GITHUB_OUTPUT"
            fi
          else
            echo "was_rejected=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Slack - Rejected
        if: steps.check-rejection.outputs.was_rejected == 'true'
        continue-on-error: true
        uses: PostHog/.github/.github/actions/slack-thread-reply@d2e7c952fef6a22b2210bcffc70bec71abeeba03
        with:
          slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
          slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
          thread_ts: ${{ needs.notify-approval-needed.outputs.slack_ts }}
          message: "${{ steps.check-rejection.outputs.message }}"
          emoji_reaction: "no_entry_sign"
