name: MCP SDK Version Compatibility Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  test-mcp-sdk-versions:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node: ["22.22.0"]

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ matrix.node }}

      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 10.33.2

      - name: Fetch all available MCP SDK versions (≥1.11)
        id: get-versions
        run: |
          # Get all versions >= 1.11, filter to get latest patch for each minor version
          VERSIONS=$(pnpm view @modelcontextprotocol/sdk versions --json | jq -c '
            map(select(test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))) |
            map(select(
              (split(".")[0] | tonumber == 1) and
              (split(".")[1] | tonumber >= 11)
            )) |
            group_by(split(".")[0:2] | join(".")) |
            map(max_by(split(".") | map(tonumber))) |
            sort_by(split(".") | map(tonumber))
          ')
          echo "versions=$VERSIONS" >> $GITHUB_OUTPUT
          echo "Found versions: $VERSIONS"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run test suite against each MCP SDK version
        env:
          NODE_VERSION: ${{ matrix.node }}
          VERSIONS: ${{ steps.get-versions.outputs.versions }}
        run: |
          echo "Testing MCP versions on Node $NODE_VERSION"

          # Parse JSON array
          for version in $(echo "$VERSIONS" | jq -r '.[]'); do
            echo "Testing @modelcontextprotocol/sdk@$version"
            
            # Install specific version
            pnpm add -D "@modelcontextprotocol/sdk@$version"
            
            # Run all tests
            if pnpm test; then
              echo "✅ Compatible with @modelcontextprotocol/sdk@$version on Node $NODE_VERSION"
            else
              echo "❌ Not compatible with @modelcontextprotocol/sdk@$version on Node $NODE_VERSION"
              exit 1
            fi
          done

  compatibility-summary:
    needs: test-mcp-sdk-versions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    steps:
      - name: Generate MCP SDK compatibility summary report
        run: |
          echo "# MCP SDK Compatibility Report"
          echo ""
          echo "Tested on: $(date)"
          echo "Node versions tested: 22.22.0"
          echo ""
          echo "See individual job results for detailed compatibility information."
